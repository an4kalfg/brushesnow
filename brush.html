  <style>
    body { font-family: Arial, sans-serif; padding: 32px 20px 60px; max-width: 980px; margin: auto; background: #fdfdfd; color:#111827; }
    .topnav{margin-bottom:20px;text-align:center;}
    .topnav a{margin:0 10px; color:#0f766e; text-decoration:none; font-weight:600;}
    h1 { color: #00775f; margin-bottom: 10px; }
    p { line-height: 1.65; }
    .btn {
      display: inline-block;
      background: #00775f;
      color: white;
      padding: 11px 22px;
      margin-top: 20px;
      text-decoration: none;
      border-radius: 10px;
      font-weight:700;
    }
    .gallery-wrap{margin: 24px 0 14px;}
    .gallery-main{position:relative; background:#fff; border-radius:14px; box-shadow:0 0 10px rgba(0,0,0,.08); padding:18px;}
    .gallery-main img{display:block; width:100%; max-height:520px; object-fit:contain; border-radius:10px; margin:0 auto;}
    .gal-btn{position:absolute; top:50%; transform:translateY(-50%); width:42px; height:42px; border:none; border-radius:999px; background:rgba(17,24,39,.75); color:#fff; font-size:24px; cursor:pointer;}
    .gal-prev{left:16px;} .gal-next{right:16px;}
    .thumbs{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:12px;}
    .thumbs img{width:90px; height:64px; object-fit:cover; border-radius:8px; border:2px solid transparent; cursor:pointer;}
    .thumbs img.active{border-color:#0f766e;}
    .meta-note{font-size:14px; color:#4b5563; margin-top:10px;}
  </style>

<body>
  <div class="topnav"><a href="/">Home</a><a href="/categories/">Categories</a><a href="/guides/">Guides</a><a href="/privacy/">Privacy</a></div>
  <h1 id="brush-title">Loading...</h1>
  <div class="gallery-wrap">
    <div class="gallery-main">
      <button class="gal-btn gal-prev" id="prevBtn" aria-label="Previous image">‹</button>
      <img id="brush-img" src="" alt="Brush Preview" loading="eager" fetchpriority="high" decoding="async" />
      <button class="gal-btn gal-next" id="nextBtn" aria-label="Next image">›</button>
    </div>
    <div class="thumbs" id="thumbs"></div>
  </div>
  <p id="brush-desc"></p>
  <div class="meta-note" id="tagline"></div>
  <div class="related-guides-box" id="related-guides" style="display:none;"><h2>Explore matching guides</h2><ul id="related-guides-list"></ul></div>
  <a id="brush-link" class="btn" href="#" target="_blank" rel="noopener">Download</a>
  <script src="brushes.js"></script>
  <script>
    const brushes = window.brushes || {};
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const imgEl = document.getElementById('brush-img');
    const relatedGuidesEl = document.getElementById('related-guides');
    const relatedGuidesListEl = document.getElementById('related-guides-list');
    const GUIDE_MATCHES = [
      {title:'Best Procreate Brushes', url:'/guides/best-procreate-brushes/', kws:['brush','painting','illustration','texture','watercolor','shading']},
      {title:'Free Procreate Brushes', url:'/guides/free-procreate-brushes/', kws:['brush','starter','texture','watercolor','patterns']},
      {title:'Procreate Stamp Brushes', url:'/guides/procreate-stamp-brushes/', kws:['stamp','stamps','pose','calendar','tarot','light beam','house','map']},
      {title:'Texture Procreate Brushes', url:'/guides/texture-procreate-brushes/', kws:['texture','grain','paper','fabric','wallpaper','lace','canvas']},
      {title:'Watercolor Procreate Brushes', url:'/guides/watercolor-procreate-brushes/', kws:['watercolor','wet wash','splatter','aquarelle']},
      {title:'Anime Procreate Brushes', url:'/guides/anime-procreate-brushes/', kws:['anime','manga','hair','kawaii','couple','faces','character']},
      {title:'Sketch Procreate Brushes', url:'/guides/sketch-procreate-brushes/', kws:['sketch','sketchbook','pencil','drawing']},
      {title:'Ink Procreate Brushes', url:'/guides/ink-procreate-brushes/', kws:['ink','inking','lineart','crosshatching','halftone']},
      {title:'Shading Procreate Brushes', url:'/guides/shading-procreate-brushes/', kws:['shading','blending','smoke','grain','marker','oil','pastel']},
      {title:'Character Design Procreate Brushes', url:'/guides/character-design-procreate-brushes/', kws:['character','portrait','hair','faces','pose']},
      {title:'Procreate Brushes for Beginners', url:'/guides/procreate-brushes-for-beginners/', kws:['beginner','starter','basic','drawing','pencil']}
    ];
    function renderRelatedGuides(data){
      var hay = ((data.title||'') + ' ' + (data.desc||'') + ' ' + (Array.isArray(data.tags)?data.tags.join(' '):'') + ' ' + (Array.isArray(data.category)?data.category.join(' '):'')).toLowerCase();
      var matches = GUIDE_MATCHES.filter(function(g){ return g.kws.some(function(k){ return hay.indexOf(k) !== -1; }); }).slice(0,4);
      if (!matches.length) return;
      relatedGuidesListEl.innerHTML = matches.map(function(g){ return '<li><a href="' + g.url + '">' + g.title + '</a></li>'; }).join('');
      relatedGuidesEl.style.display = 'block';
    }
    const thumbsEl = document.getElementById('thumbs');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    let gallery = [];
    let current = 0;


    function normalizeCfUrl(url){
      if (!url) return url;
      return url.replace(/-\d+x\d+(?=\.(jpg|jpeg|png|webp)$)/i, '');
    }

    function preloadImage(url){
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(url);
        img.onerror = () => resolve(null);
        img.src = normalizeCfUrl(url);
      });
    }

    async function prepareGallery(urls){
      const clean = [...new Set((urls || []).map(normalizeCfUrl).filter(Boolean))];
      const loaded = await Promise.all(clean.map(preloadImage));
      return loaded.filter(Boolean);
    }

    function makeThumb(url){
      if (!url) return url;
      if (/-(\d+)x(\d+)(?=\.(jpg|jpeg|png|webp)$)/i.test(url)) return url;
      return url.replace(/(\.(jpg|jpeg|png|webp)$)/i, '-312x208$1');
    }

    function loadProgressiveImage(url, indexToKeep){
      const full = url;
      const thumb = makeThumb(url);
      imgEl.alt = document.getElementById('brush-title').textContent;
      imgEl.src = thumb;

      imgEl.onerror = () => {
        if (current === indexToKeep) imgEl.src = full;
      };

      const preloader = new Image();
      preloader.decoding = 'async';
      preloader.fetchPriority = 'high';
      preloader.onload = () => {
        if (current === indexToKeep) imgEl.src = full;
      };
      preloader.src = full;
    }

    function renderGallery(){
      if (!gallery.length) return;
      loadProgressiveImage(gallery[current], current);
      thumbsEl.innerHTML = gallery.map((u,i)=>`<img src="${makeThumb(u)}" data-i="${i}" class="${i===current?'active':''}" loading="lazy" decoding="async" alt="Preview ${i+1}">`).join('');
      thumbsEl.querySelectorAll('img').forEach(el=>el.addEventListener('click',()=>{current=Number(el.dataset.i); renderGallery();}));
      const multi = gallery.length > 1;
      prevBtn.style.display = multi ? 'block' : 'none';
      nextBtn.style.display = multi ? 'block' : 'none';
    }
    prevBtn.addEventListener('click',()=>{current=(current-1+gallery.length)%gallery.length; renderGallery();});
    nextBtn.addEventListener('click',()=>{current=(current+1)%gallery.length; renderGallery();});

    if (id && brushes[id]) {
      const data = brushes[id];
      const title = data.title || 'Brush Details';
      document.getElementById("brush-title").textContent = title;
      const rawGallery = Array.isArray(data.images) && data.images.length ? data.images : [data.img].filter(Boolean);
      prepareGallery(rawGallery).then(valid => {
        gallery = valid.length ? valid : rawGallery.map(normalizeCfUrl).filter(Boolean);
        current = 0;
        renderGallery();
          });
      document.getElementById("brush-desc").textContent = data.desc || '';
      document.getElementById("brush-link").href = data.link || '#';
      document.getElementById('tagline').textContent = Array.isArray(data.tags) ? `Tags: ${data.tags.join(', ')}` : '';
      renderRelatedGuides(data);
      const clean = (data.desc || '').replace(/\s+/g,' ').trim();
      document.title = `${title} | Treasure of Art Tools`;
      document.querySelector('meta[name="description"]').setAttribute('content', clean.slice(0, 160));
      document.getElementById('canonical-link').href = `https://brushesnow.com/brush.html?id=${encodeURIComponent(id)}`;
      document.getElementById('og-title').setAttribute('content', title);
      document.getElementById('og-desc').setAttribute('content', clean.slice(0,160));
      document.getElementById('og-url').setAttribute('content', `https://brushesnow.com/brush.html?id=${encodeURIComponent(id)}`);
      document.getElementById('tw-title').setAttribute('content', title);
      document.getElementById('tw-desc').setAttribute('content', clean.slice(0,160));
      const ld = {"@context":"https://schema.org","@type":"CreativeWork","name":title,"description":clean,"image":(Array.isArray(data.images) && data.images.length ? data.images : [data.img]).map(normalizeCfUrl).filter(Boolean),"url":`https://brushesnow.com/brush.html?id=${encodeURIComponent(id)}`};
      const s=document.createElement('script'); s.type='application/ld+json'; s.textContent=JSON.stringify(ld); document.head.appendChild(s);
    } else {
      document.body.innerHTML = '<h1>Brush not found</h1><p>Please check the link or return to the homepage.</p>';
    }
  </script>
</body>
</html>
