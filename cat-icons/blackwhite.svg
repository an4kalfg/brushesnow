<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#111827"/>
    <stop offset="1" stop-color="#000000"/>
  </linearGradient>
  <pattern id="hatch" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(25)">
    <line x1="0" y1="0" x2="0" y2="16" stroke="#ffffff" stroke-width="5" opacity="0.18"/>
  </pattern>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
  </filter>
</defs>
<g filter="url(#shadow)">
  <rect x="72" y="72" width="368" height="368" rx="36" fill="url(#bg)"/>
  <rect x="92" y="92" width="328" height="328" rx="28" fill="url(#hatch)"/>
  <!-- bold strokes -->
  <g stroke="#ffffff" stroke-width="14" opacity="0.35" stroke-linecap="round">
    <path d="M140 170c60 30 110 30 170 0"/>
    <path d="M160 260c70 36 120 36 190 0"/>
    <path d="M150 350c60 26 110 26 170 0"/>
  </g>
</g>
</svg>