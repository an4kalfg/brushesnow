<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#1683c8"/>
    <stop offset="1" stop-color="#0b1f2a"/>
  </linearGradient>
  <pattern id="dots" width="16" height="16" patternUnits="userSpaceOnUse">
    <circle cx="4" cy="4" r="2" fill="#ffffff" opacity="0.22"/>
  </pattern>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
  </filter>
</defs>
<g filter="url(#shadow)">
  <rect x="72" y="72" width="368" height="368" rx="36" fill="url(#bg)"/>
  <rect x="92" y="92" width="328" height="328" rx="28" fill="url(#dots)"/>
  <!-- panel -->
  <rect x="140" y="150" width="160" height="120" rx="18" fill="#ffffff" opacity="0.9"/>
  <rect x="318" y="150" width="54" height="240" rx="18" fill="#ffffff" opacity="0.85"/>
  <rect x="140" y="288" width="160" height="102" rx="18" fill="#ffffff" opacity="0.88"/>
  <!-- speed lines -->
  <g stroke="#0b1f2a" stroke-width="10" opacity="0.25" stroke-linecap="round">
    <path d="M160 170h110"/>
    <path d="M160 210h90"/>
    <path d="M160 330h110"/>
  </g>
</g>
</svg>