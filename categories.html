<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  
<link rel="icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<title>Categories | BrushesNow</title>
  <meta name="description" content="Browse Procreate brushes by category: Anime, Black & White, Manga, Textures, Tattoo, Shading, and more."/>
  <meta name="robots" content="index,follow"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header>
  <nav>
    <a href="index.html">Home</a>
    <a href="categories.html">Categories</a>
<a href="privacy.html">Privacy</a>
  </nav>
</header>

<div class="hero">
  <h1>Categories</h1>
  </div>

<section class="brushes">
  <div class="card-container" id="grid"></div>
</section>

<script src="brushes.js"></script>
<script>
  const brushes = window.brushes || {};

  function inferTags(b){
    const t = ((b.title||"") + " " + (b.desc||"")).toLowerCase();
    const tags = new Set();

    if (/(anime|manga|screentone|pose|chibi)/.test(t)) tags.add("anime");
    if (/(manga|screentone|halftone|comic)/.test(t)) tags.add("manga");
    if (/(tattoo|spitshading)/.test(t)) tags.add("tattoo");
    if (/(texture|fabric|clothes|wallpaper|grain)/.test(t)) tags.add("texture");
    if (/(pose|stamps|stamp|calendar)/.test(t)) tags.add("stamps");
    if (/(crosshatch|hatching|ink|inking|lineart)/.test(t)) tags.add("inking");
    if (/(shade|shading|gradient)/.test(t)) tags.add("shading");
    if (/(black\s*&\s*white|black\s*and\s*white|b\s*&\s*w|monochrome|grayscale|greyscale|ink|crosshatch|hatching|screentone|halftone|lineart)/.test(t)) tags.add("blackwhite");

    if (Array.isArray(b.category)) b.category.forEach(x => tags.add(String(x).toLowerCase()));
    else if (typeof b.category === "string" && b.category.trim()) tags.add(b.category.toLowerCase());

    tags.delete("all");
    return Array.from(tags);
  }

  const counts = {};
  Object.values(brushes).forEach(b=>{
    inferTags(b).forEach(tag=>{
      counts[tag] = (counts[tag]||0) + 1;
    });
  });

  // Show ONLY categories that have items
  const order = Object.entries(counts)
    .filter(([,n]) => n > 0)
    .sort((a,b)=> b[1]-a[1]);

  const labelMap = {
    blackwhite: "Black & White"
  };
  const nice = (s)=> labelMap[s] || s.replace(/[-_]+/g," ").replace(/\b\w/g, c => c.toUpperCase());

  const coverClass = (tag)=> "cat-cover cat-" + tag.replace(/[^a-z0-9_-]/g,"");

  const grid = document.getElementById("grid");
  grid.innerHTML = order.map(([tag,n])=>`
    <div class="card category-card">
      <div class="${coverClass(tag)}"></div>
      <h3>${nice(tag)}</h3>
      <p>Explore this category.</p>
      <a href="category.html?cat=${encodeURIComponent(tag)}" class="btn btn-primary">Open</a>
    </div>
  `).join("");
</script>

</body>
</html>
