<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <title>Categories | BrushesNow</title>
  <meta name="description" content="Browse Procreate brushes by category: Anime, Black & White, Manga, Textures, Tattoo, Shading, and more."/>
  <meta name="robots" content="index,follow"/>
  <link rel="stylesheet" href="style.css"/>

<link rel="icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
</head>
<body>

<header>
  <nav>
    <a href="index.html">Home</a>
    <a href="categories.html">Categories</a>
    <a href="category.html?cat=anime">Anime</a>
    <a href="category.html?cat=blackwhite">Black &amp; White</a>
    <a href="privacy.html">Privacy</a>
  </nav>
</header>

<div class="hero">
  <h1>Browse Categories</h1>
  <p>Categories are generated automatically from your existing brush titles and descriptions.</p>
</div>

<section class="brushes">
  <div class="card-container" id="grid"></div>
</section>

<script src="brushes.js"></script>
<script>
  const brushes = window.brushes || {};

  function inferTags(b){
    const t = ((b.title||"") + " " + (b.desc||"")).toLowerCase();
    const tags = new Set();

    if (/(anime|manga|screentone|pose|chibi)/.test(t)) tags.add("anime");
    if (/(manga|screentone|halftone|comic)/.test(t)) tags.add("manga");
    if (/(tattoo|spitshading)/.test(t)) tags.add("tattoo");
    if (/(texture|fabric|clothes)/.test(t)) tags.add("texture");
    if (/(pose|stamps|stamp)/.test(t)) tags.add("stamps");
    if (/(crosshatch|hatching|ink|inking|lineart)/.test(t)) tags.add("inking");
    if (/(shade|shading|gradient)/.test(t)) tags.add("shading");
    if (/(black\s*&\s*white|black\s*and\s*white|b\s*&\s*w|monochrome|grayscale|greyscale|ink|crosshatch|hatching|screentone|halftone|lineart)/.test(t)) tags.add("blackwhite");

    if (Array.isArray(b.category)) b.category.forEach(x => tags.add(String(x).toLowerCase()));
    else if (typeof b.category === "string" && b.category.trim()) tags.add(b.category.toLowerCase());

    tags.delete("all");
    return Array.from(tags);
  }

  const counts = {};
  Object.values(brushes).forEach(b=>{
    inferTags(b).forEach(tag=>{
      counts[tag] = (counts[tag]||0) + 1;
    });
  });

  // Always show these important ones even if 0
  ["anime","blackwhite","manga","texture","tattoo","stamps","inking","shading"].forEach(k=>{
    if (!(k in counts)) counts[k]=0;
  });

  const nice = (s)=> s.replace(/[-_]+/g," ").replace(/\b\w/g, c => c.toUpperCase());
  const order = Object.entries(counts).sort((a,b)=> b[1]-a[1]);

  const grid = document.getElementById("grid");
  grid.innerHTML = order.map(([tag,n])=>`
    <div class="card">
      <h3>${nice(tag)} (${n})</h3>
      <p>Browse ${n} item${n===1?"":"s"} in this category.</p>
      <a href="category.html?cat=${encodeURIComponent(tag)}" class="btn">Open</a>
    </div>
  `).join("");
</script>

</body>
</html>
