<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <link rel="icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <title>Categories | BrushesNow</title>
  <meta name="description" content="Browse Procreate brushes by category: stamps, textures, shading, manga, anime, black and white, and more."/>
  <meta name="robots" content="index,follow"/>

  <link rel="stylesheet" href="/style.css"/>
  <link rel="stylesheet" href="/style_additions.css"/>
</head>
<body>

<header>
  <nav>
    <a href="/">Home</a>
    <a href="/categories/">Categories</a>
    <a href="/privacy/">Privacy</a>
  </nav>
</header>

<div class="hero">
  <h1>Categories</h1>
  <p>Pick a category to explore curated Procreate brushes, stamps, textures, and packs.</p>
</div>

<section class="brushes">
  <div class="card-container" id="grid"></div>
</section>

<script src="/brushes.js"></script>
<script>
  const brushes = window.brushes || {};

  function inferTags(b){
    const t = ((b.title||"") + " " + (b.desc||"")).toLowerCase();
    const tags = new Set();

    if (/(anime|manga|screentone|pose|chibi)/.test(t)) tags.add("anime");
    if (/(manga|screentone|halftone|comic)/.test(t)) tags.add("manga");
    if (/(tattoo|spitshading)/.test(t)) tags.add("tattoo");
    if (/(texture|fabric|clothes|grain|pattern|wallpaper|paper)/.test(t)) tags.add("texture");
    if (/(pose|stamps|stamp)/.test(t)) tags.add("stamps");
    if (/(crosshatch|hatching|ink|inking|lineart|pencil)/.test(t)) tags.add("inking");
    if (/(shade|shading|gradient|light beam|smoke)/.test(t)) tags.add("shading");

    if (/(black\s*&\s*white|black\s*and\s*white|b\s*&\s*w|monochrome|grayscale|greyscale|ink|crosshatch|hatching|screentone|halftone|lineart)/.test(t)) {
      tags.add("blackwhite");
    }

    if (Array.isArray(b.category)) b.category.forEach(x => tags.add(String(x).toLowerCase()));
    else if (typeof b.category === "string" && b.category.trim()) tags.add(b.category.toLowerCase());

    tags.delete("all");
    return Array.from(tags);
  }

  const counts = {};
  Object.values(brushes).forEach(b=>{
    inferTags(b).forEach(tag=>{
      counts[tag] = (counts[tag]||0) + 1;
    });
  });

  // only show non-empty categories
  const order = Object.entries(counts)
    .filter(([tag,n])=> n > 0)
    .sort((a,b)=> (b[1]-a[1]) || a[0].localeCompare(b[0]));

  const nice = (s)=> {
    if (s === "blackwhite") return "Black & White";
    return s.replace(/[-_]+/g," ").replace(/\b\w/g, c => c.toUpperCase());
  };

  const coverClass = (tag)=>{
    switch(tag){
      case "stamps": return "cat-stamps";
      case "texture": return "cat-texture";
      case "anime": return "cat-anime";
      case "manga": return "cat-manga";
      case "shading": return "cat-shading";
      case "inking": return "cat-inking";
      case "tattoo": return "cat-tattoo";
      case "blackwhite": return "cat-bw";
      default: return "cat-other";
    }
  };


const coverCollage = (tag)=>{
  // pick up to 3 images from brushes in this category
  const imgs = [];
  for (const [id,b] of Object.entries(brushes)){
    const tags = inferTags(b);
    if (!tags.includes(tag)) continue;
    if (b.img) imgs.push(b.img);
    if (imgs.length >= 3) break;
  }
  // fallback: empty collage (keeps layout)
  const safe = (u)=>String(u).replace(/"/g,'&quot;');
  const slots = [0,1,2].map(i=>{
    const url = imgs[i] || "";
    return `<div class="cat-collage-slot" style="${url?`background-image:url("${safe(url)}")`:''}"></div>`;
  }).join("");
  return `<div class="cat-collage" aria-hidden="true">${slots}</div>`;
};
  const grid = document.getElementById("grid");
  grid.innerHTML = order.map(([tag,n])=>`
    <div class="card cat-card">
      <div class="cat-cover ${coverClass(tag)}">${coverCollage(tag)}</div>
      <h3>${nice(tag)}</h3>
      <p class="muted">Explore this category.</p>
      <a href="/category.html?cat=${encodeURIComponent(tag)}" class="btn btn-primary">Open</a>
    </div>
  `).join("");
</script>

</body>
</html>
