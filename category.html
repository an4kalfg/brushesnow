<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <title>Category | Treasure of Art Tools</title>
  <meta name="description" content="Browse Procreate brushes by category: watercolor, texture, anime, manga, tattoo, patterns, sketchbook, ink, and more."/>
  <meta name="robots" content="noindex,follow"/>
  <link rel="canonical" id="canonical-link" href="https://brushesnow.com/category.html" />
  <meta property="og:type" content="website" />
  <meta property="og:title" id="og-title" content="Category | Treasure of Art Tools" />
  <meta property="og:description" id="og-desc" content="Browse Procreate brushes by category." />
  <meta property="og:url" id="og-url" content="https://brushesnow.com/category.html" />
  <meta property="og:image" content="https://brushesnow.com/apple-touch-icon.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="style_additions.css"/>
</head>
<body>
<header>
  <nav>
    <a href="/">Home</a>
    <a href="/categories/">Categories</a>
    <a href="/privacy/">Privacy</a>
  </nav>
</header>
<div class="hero">
  <h1 id="h1">Procreate Brushes</h1>
  <p id="sub">Browse curated brush packs and stamps. Click Download to open the full details.</p>
</div>
<section class="brushes">
  <div class="card-container" id="grid"></div>
</section>
<script src="brushes.js"></script>
<script>
  const brushes = window.brushes || {};
  const params = new URLSearchParams(location.search);
  const cat = (params.get("cat") || "").toLowerCase().trim();
  const tagDefs = {
    'stamps':['stamp','stamps','pose','poses','bases','creator','toolbox','calendar','tarot','cards'],
    'texture':['texture','grain','paper','wallpaper','lace','fabric','clothes','seamless','canvas'],
    'anime':['anime','chibi','manga','kawaii','hair','character-design','couple'],
    'shading':['shading','shade','marker','watercolor','aquarelle','pastel','oil-paint','smoke','blending','acrylic'],
    'manga':['manga','screentone','halftone','comic','comics','woodblock'],
    'blackwhite':['blackwhite','black-white','black and white','monochrome','grayscale','ink','crosshatch','hatching','lineart'],
    'inking':['inking','ink','lineart','pencil','pen'],
    'tattoo':['tattoo','stencil','koi'],
    'watercolor':['watercolor','wet-wash','splatter'],
    'patterns':['patterns','pattern','knit','floral','flowers','surface-design'],
    'glitter':['glitter','sparkle','effects'],
    'bubbles':['bubbles'],
    'blending':['blending'],
    'character-design':['character-design','portraits'],
    'acrylic':['acrylic'],
    'oil-paint':['oil-paint'],
    'sketchbook':['sketchbook','sketch','drawing'],
    'floral':['floral','flowers','botanical']
  };
  function inferTags(b){
    const tags = new Set();
    (Array.isArray(b.tags)?b.tags:[]).forEach(t=>tags.add(String(t).toLowerCase()));
    (Array.isArray(b.category)?b.category:[]).forEach(t=>tags.add(String(t).toLowerCase()));
    const text = ((b.title||'')+' '+(b.desc||'')).toLowerCase();
    Object.entries(tagDefs).forEach(([slug,kws])=>{ if (kws.some(k=>text.includes(k))) tags.add(slug); });
    tags.add('all');
    return Array.from(tags);
  }
  const titleMap = Object.fromEntries(Object.keys(tagDefs).map(k=>[k, k.replace(/[-_]+/g,' ').replace(/\w/g,c=>c.toUpperCase())]));
  const titleBase = cat ? `${titleMap[cat] || cat} Procreate Brushes` : 'Procreate Brushes';
  document.getElementById('h1').textContent = titleBase;
  document.title = `${titleBase} | Treasure of Art Tools`;
  document.getElementById('sub').textContent = cat ? `Browse ${titleMap[cat] || cat} Procreate brushes, textures, stamps, and related packs.` : 'Browse curated brush packs and stamps.';
  const prettyCatUrl = cat ? `https://brushesnow.com/tags/${encodeURIComponent(cat)}/` : 'https://brushesnow.com/categories/';
  document.getElementById('canonical-link').href = prettyCatUrl;
  document.getElementById('og-title').setAttribute('content', titleBase);
  document.getElementById('og-desc').setAttribute('content', document.getElementById('sub').textContent);
  document.getElementById('og-url').setAttribute('content', prettyCatUrl);

  const filtered = Object.entries(brushes).filter(([id,b]) => !cat || inferTags(b).includes(cat));
  const grid = document.getElementById('grid');
  grid.innerHTML = filtered.length ? filtered.map(([id,b])=>`<div class="card"><img src="${b.img}" alt="${(b.title||'').replace(/"/g,'&quot;')}"><h3>${b.title||''}</h3><p>${b.desc||''}</p><a href="brush.html?id=${encodeURIComponent(id)}" class="btn btn-primary">View Details</a></div>`).join('') : '<div style="padding:20px;text-align:center;width:100%;"><h2>No items yet</h2><p>Try another category.</p></div>';
</script>
</body>
</html>
