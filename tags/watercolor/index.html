<header><h1>Treasure of Art Tools</h1><nav><a href="/">Home</a><a href="/categories/">Categories</a><a href="/privacy/">Privacy</a></nav></header>
<section class="hero"><h1>Watercolor Procreate Brushes</h1><p>Hand-picked watercolor procreate brushes with official creator links and preview galleries.</p></section>
<section class="brushes"><div class="card-container" id="grid"></div></section>
<script src="/brushes.js"></script>
<script>
  const TAG = "watercolor";
  const brushes = window.brushes || {};
  function inferTags(b){ const tags = new Set(); (Array.isArray(b.tags)?b.tags:[]).forEach(t=>tags.add(String(t).toLowerCase())); (Array.isArray(b.category)?b.category:[]).forEach(t=>tags.add(String(t).toLowerCase())); const text=((b.title||'')+' '+(b.desc||'')).toLowerCase(); const kws="watercolor".split(/\s+/); kws.forEach(k=>{ if(text.includes(k)) tags.add(TAG); }); return Array.from(tags); }
  const filtered=Object.entries(brushes).filter(([id,b])=>inferTags(b).includes(TAG));
  document.getElementById('grid').innerHTML = filtered.map(([id,b])=>`<div class="card"><img src="${b.img}" alt="${b.title||''}"><h3>${b.title||''}</h3><p>${b.desc||''}</p><a href="/brush.html?id=${encodeURIComponent(id)}" class="btn btn-primary">Download</a></div>`).join('');
</script></body></html>
